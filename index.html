<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון שליחויות - ניהול מלא</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin: 0 0 15px 0; text-align: center; font-size: 1.2em; }
        
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; font-size: 13px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-calc { background: #6c757d; color: white; margin-top: 5px; }
        .btn-save { background: var(--success); color: white; margin-top: 10px; }
        
        .settings-content { display: none; background: #f9f9f9; padding: 12px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 10px; }
        .settings-toggle { color: var(--primary); font-size: 13px; text-decoration: underline; cursor: pointer; display: block; text-align: center; margin-bottom: 8px; }

        .info-box { background: #fff3cd; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center; font-size: 14px; }
        
        /* עיצוב הטבלה */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; min-width: 400px; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #343a40; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .footer-row { background: #eee !important; font-weight: bold; border-top: 2px solid #333; }
        .del-btn { background: none; border: none; color: var(--danger); font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <span class="settings-toggle" onclick="toggleSettings()">⚙️ הגדרות רכב וכיול</span>
    <div id="settingsArea" class="settings-content">
        <div class="input-group"><label>ק"מ לליטר</label><input type="number" id="cfg_kmPerLiter" value="16"></div>
        <div class="input-group"><label>מקדם עלייה</label><input type="number" id="cfg_upFactor" value="1.6" step="0.1"></div>
        <div class="input-group"><label>מקדם ירידה</label><input type="number" id="cfg_downFactor" value="0.85" step="0.05"></div>
        <div class="input-group"><label>מחיר ליטר</label><input type="number" id="cfg_fuelPrice" value="7.50"></div>
        <div class="input-group"><label>בלאי לק"מ (₪)</label><input type="number" id="cfg_depreciation" value="0.20"></div>
        <button class="btn" style="background:#ddd" onclick="toggleSettings()">סגור</button>
    </div>

    <div class="card">
        <h2>רישום משמרת 🛵</h2>
        <div class="input-group">
            <label>💰 הכנסה ברוטו (₪)</label>
            <input type="number" id="income" placeholder="סה"כ שהתקבל" inputmode="decimal">
        </div>

        <div style="border: 1px dashed #007bff; padding: 10px; border-radius: 10px;">
            <label>📍 מסלול</label>
            <input type="text" id="startLoc" value="אשדוד" style="margin-bottom:5px">
            <input type="text" id="endLoc" placeholder="יעד">
            <label style="font-weight:normal; margin: 8px 0; display:flex; align-items:center;">
                <input type="checkbox" id="roundTrip" style="width:18px; margin-left:8px" checked> הלוך חזור
            </label>
            <button type="button" class="btn btn-calc" onclick="calculateRoute()">חשב נתוני נסיעה</button>
            <div id="routeOutput" class="info-box" style="display:none"></div>
        </div>

        <div class="input-group" style="margin-top:10px">
            <label>⛽ עלות דלק (₪)</label>
            <input type="number" id="fuelDisplay" step="0.1">
        </div>

        <input type="hidden" id="kmValue" value="0">
        <button class="btn btn-save" onclick="saveShift()">שמור משמרת ✅</button>
    </div>

    <div class="card">
        <h2>סיכום היסטוריה 📊</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>תאריך</th>
                        <th>ק"מ</th>
                        <th>דלק</th>
                        <th>נקי</th>
                        <th>🗑️</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot>
                    <tr id="tableFooter" class="footer-row"></tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDShy-oDCCBM3NehLCfJdbhXaX8kbcax_8",
        authDomain: "my-delivere-tracker.firebaseapp.com",
        databaseURL: "https://my-delivere-tracker-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "my-delivere-tracker",
        storageBucket: "my-delivere-tracker.firebasestorage.app",
        messagingSenderId: "529344024028",
        appId: "1:529344024028:web:a5cf000943408913c79319",
        measurementId: "G-GE58HKQKLK"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function toggleSettings() {
        const area = document.getElementById('settingsArea');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    }

    async function calculateRoute() {
        const start = document.getElementById('startLoc').value;
        const end = document.getElementById('endLoc').value;
        const isRoundTrip = document.getElementById('roundTrip').checked;
        const output = document.getElementById('routeOutput');

        output.style.display = 'block';
        output.innerText = "מחשב...";

        try {
            const getCoords = async (l) => {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${l}`);
                const d = await r.json(); return d[0];
            };
            const c1 = await getCoords(start);
            const c2 = await getCoords(end);
            const routeR = await fetch(`https://router.project-osrm.org/route/v1/driving/${c1.lon},${c1.lat};${c2.lon},${c2.lat}?overview=false`);
            const routeD = await routeR.json();
            const oneWayKm = routeD.routes[0].distance / 1000;

            const avgL = parseFloat(document.getElementById('cfg_kmPerLiter').value);
            const upF = parseFloat(document.getElementById('cfg_upFactor').value);
            const downF = parseFloat(document.getElementById('cfg_downFactor').value);
            const price = parseFloat(document.getElementById('cfg_fuelPrice').value);

            let costOut = (oneWayKm / avgL) * price;
            if (end.includes("ירושלים")) costOut *= upF;
            else if (start.includes("ירושלים")) costOut *= downF;

            let costBack = 0;
            if (isRoundTrip) {
                let factorBack = 1.0;
                if (end.includes("ירושלים")) factorBack = downF;
                else if (start.includes("ירושלים")) factorBack = upF;
                costBack = (oneWayKm / avgL) * price * factorBack;
            }

            const totalFuel = costOut + costBack;
            const totalKm = isRoundTrip ? oneWayKm * 2 : oneWayKm;

            document.getElementById('kmValue').value = totalKm.toFixed(1);
            document.getElementById('fuelDisplay').value = totalFuel.toFixed(1);
            output.innerHTML = `🏁 ק"מ: ${totalKm.toFixed(1)} | דלק: ₪${totalFuel.toFixed(1)}`;
        } catch (e) { output.innerText = "שגיאה בחישוב."; }
    }

    function saveShift() {
        const inc = parseFloat(document.getElementById('income').value);
        const fuel = parseFloat(document.getElementById('fuelDisplay').value);
        const km = parseFloat(document.getElementById('kmValue').value);
        const dep = parseFloat(document.getElementById('cfg_depreciation').value);

        if (!inc || isNaN(fuel)) return alert("מלא נתונים");

        const net = inc - fuel - (inc * 0.12) - (km * dep);
        database.ref('shifts/' + Date.now()).set({
            date: new Date().toLocaleDateString('he-IL'),
            income: inc, fuel: fuel, km: km, net: net, timestamp: Date.now()
        }).then(() => { alert("נשמר!"); location.reload(); });
    }

    function deleteEntry(id) {
        if(confirm("למחוק את המשמרת הזו?")) {
            database.ref('shifts/' + id).remove();
        }
    }

    database.ref('shifts').on('value', (s) => {
        const data = s.val();
        const body = document.getElementById('tableBody');
        const footer = document.getElementById('tableFooter');
        body.innerHTML = '';
        
        let totalKm = 0, totalFuel = 0, totalNet = 0;

        if (data) {
            Object.values(data).sort((a,b)=>b.timestamp-a.timestamp).forEach(x => {
                totalKm += x.km;
                totalFuel += x.fuel;
                totalNet += x.net;

                body.innerHTML += `
                    <tr>
                        <td>${x.date}</td>
                        <td>${x.km.toFixed(0)}</td>
                        <td>${x.fuel.toFixed(0)}</td>
                        <td><b>₪${x.net.toFixed(0)}</b></td>
                        <td><button class="del-btn" onclick="deleteEntry('${x.timestamp}')">🗑️</button></td>
                    </tr>`;
            });

            footer.innerHTML = `
                <td>סה"כ</td>
                <td>${totalKm.toFixed(0)}</td>
                <td>₪${totalFuel.toFixed(0)}</td>
                <td style="color:green">₪${totalNet.toFixed(0)}</td>
                <td></td>`;
        } else {
            body.innerHTML = '<tr><td colspan="5">אין נתונים</td></tr>';
            footer.innerHTML = '';
        }
    });
</script>
</body>
</html>
