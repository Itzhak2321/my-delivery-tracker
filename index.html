<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון שליחויות - גרסת המסלול 🍓</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 700px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin: 0 0 15px 0; text-align: center; font-size: 1.2em; color: #333; }
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; font-size: 13px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .checkbox-row { display: flex; gap: 15px; margin: 15px 0; align-items: center; justify-content: center; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #e0e0e0; }
        .checkbox-item { display: flex; align-items: center; font-size: 13px; cursor: pointer; }
        .checkbox-item input { width: 18px; height: 18px; margin-left: 6px; cursor: pointer; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-calc { background: #6c757d; color: white; margin-top: 5px; }
        .btn-save { background: var(--success); color: white; margin-top: 15px; }
        
        .settings-content { display: none; background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; }
        .settings-toggle { color: var(--primary); font-size: 13px; text-decoration: underline; cursor: pointer; display: block; text-align: center; margin-bottom: 10px; }
        .info-box { background: #fff3cd; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center; font-size: 14px; border: 1px solid #ffeeba; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 11px; min-width: 600px; }
        th, td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #343a40; color: white; }
        .footer-row { background: #e9ecef !important; font-weight: bold; border-top: 2px solid #333; }
        .del-btn { background: none; border: none; color: var(--danger); font-size: 16px; cursor: pointer; }
        .route-cell { max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #666; font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <span class="settings-toggle" onclick="toggleSettings()">⚙️ הגדרות וכיול</span>
    <div id="settingsArea" class="settings-content">
        <div class="input-group"><label>ק"מ לליטר</label><input type="number" id="cfg_kmPerLiter" value="16"></div>
        <div class="input-group"><label>מקדם עלייה</label><input type="number" id="cfg_upFactor" value="1.6"></div>
        <div class="input-group"><label>מקדם ירידה</label><input type="number" id="cfg_downFactor" value="0.85"></div>
        <div class="input-group"><label>מחיר ליטר (₪)</label><input type="number" id="cfg_fuelPrice" value="8.03"></div>
        <div class="input-group"><label>בלאי לק"מ</label><input type="number" id="cfg_depreciation" value="0.20"></div>
        <button class="btn" style="background:#ddd" onclick="toggleSettings()">סגור</button>
    </div>

    <div class="card">
        <h2>רישום משמרת 🛵</h2>
        <div class="input-group">
            <label>💰 הכנסה ברוטו (₪)</label>
            <input type="number" id="income" placeholder="הכנס סכום ברוטו" inputmode="decimal">
        </div>

        <div style="border: 1px dashed #007bff; padding: 12px; border-radius: 12px; background: #f8fbff;">
            <label>📍 מסלול נסיעה</label>
            <input type="text" id="startLoc" placeholder="מאיפה?" style="margin-bottom:8px">
            <input type="text" id="endLoc" placeholder="לאן?">
            
            <div class="checkbox-row">
                <label class="checkbox-item">
                    <input type="checkbox" id="roundTrip"> הלוך חזור
                </label>
                <label class="checkbox-item" style="color: #d63384; font-weight: bold;">
                    <input type="checkbox" id="isClean"> משלוח נקי ✨
                </label>
            </div>

            <button type="button" class="btn btn-calc" onclick="calculateRoute()">חשב דלק ומרחק ⚡</button>
            <div id="routeOutput" class="info-box" style="display:none"></div>
        </div>

        <input type="hidden" id="fuelValue" value="0">
        <input type="hidden" id="kmValue" value="0">
        
        <button class="btn btn-save" onclick="saveShift()">שמור משמרת ✅</button>
    </div>

    <div class="card">
        <h2>היסטוריה וסיכומים 📊</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>תאריך</th>
                        <th>מסלול</th>
                        <th>ק"מ</th>
                        <th>דלק</th>
                        <th>תותים 🍓</th>
                        <th>נקי</th>
                        <th>🗑️</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot id="tableFooter"></tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDShy-oDCCBM3NehLCfJdbhXaX8kbcax_8",
        authDomain: "my-delivere-tracker.firebaseapp.com",
        databaseURL: "https://my-delivere-tracker-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "my-delivere-tracker",
        storageBucket: "my-delivere-tracker.firebasestorage.app",
        messagingSenderId: "529344024028",
        appId: "1:529344024028:web:a5cf000943408913c79319",
        measurementId: "G-GE58HKQKLK"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function toggleSettings() {
        const area = document.getElementById('settingsArea');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    }

    async function calculateRoute() {
        const start = document.getElementById('startLoc').value;
        const end = document.getElementById('endLoc').value;
        const isRoundTrip = document.getElementById('roundTrip').checked;
        const output = document.getElementById('routeOutput');

        if (!start || !end) return alert("מלא מוצא ויעד");
        output.style.display = 'block'; output.innerText = "מחשב...";

        try {
            const getCoords = async (l) => {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${l}`);
                const d = await r.json(); return d[0];
            };
            const c1 = await getCoords(start);
            const c2 = await getCoords(end);
            const routeR = await fetch(`https://router.project-osrm.org/route/v1/driving/${c1.lon},${c1.lat};${c2.lon},${c2.lat}?overview=false`);
            const routeD = await routeR.json();
            const oneWayKm = routeD.routes[0].distance / 1000;

            const avgL = parseFloat(document.getElementById('cfg_kmPerLiter').value);
            const upF = parseFloat(document.getElementById('cfg_upFactor').value);
            const downF = parseFloat(document.getElementById('cfg_downFactor').value);
            const price = parseFloat(document.getElementById('cfg_fuelPrice').value);

            let costOut = (oneWayKm / avgL) * price;
            if (end.includes("ירושלים")) costOut *= upF;
            else if (start.includes("ירושלים")) costOut *= downF;

            let costBack = 0;
            if (isRoundTrip) {
                let factorBack = 1.0;
                if (end.includes("ירושלים")) factorBack = downF;
                else if (start.includes("ירושלים")) factorBack = upF;
                costBack = (oneWayKm / avgL) * price * factorBack;
            }

            const totalFuel = costOut + costBack;
            const totalKm = isRoundTrip ? oneWayKm * 2 : oneWayKm;

            document.getElementById('kmValue').value = totalKm.toFixed(1);
            document.getElementById('fuelValue').value = totalFuel.toFixed(1);
            output.innerHTML = `🏁 ק"מ: ${totalKm.toFixed(1)} | דלק: ₪${totalFuel.toFixed(1)}`;
        } catch (e) { output.innerText = "שגיאה בחישוב."; }
    }

    function saveShift() {
        const inc = parseFloat(document.getElementById('income').value);
        const fuel = parseFloat(document.getElementById('fuelValue').value);
        const km = parseFloat(document.getElementById('kmValue').value);
        const dep = parseFloat(document.getElementById('cfg_depreciation').value);
        const start = document.getElementById('startLoc').value;
        const end = document.getElementById('endLoc').value;
        const isClean = document.getElementById('isClean').checked;

        if (!inc || isNaN(fuel) || fuel === 0) return alert("אנא חשב מסלול לפני השמירה");

        const strawberries = isClean ? 0 : (inc * 0.12);
        const net = inc - fuel - strawberries - (km * dep);
        const routeName = `${start} ⬅️ ${end}`;
        
        database.ref('shifts/' + Date.now()).set({
            date: new Date().toLocaleDateString('he-IL'),
            route: routeName,
            income: inc, fuel: fuel, km: km, strawberries: strawberries, net: net, timestamp: Date.now()
        }).then(() => { 
            alert("נשמר בהצלחה!"); 
            document.getElementById('income').value = '';
            document.getElementById('startLoc').value = '';
            document.getElementById('endLoc').value = '';
            document.getElementById('routeOutput').style.display = 'none';
            document.getElementById('fuelValue').value = '0';
            document.getElementById('isClean').checked = false;
            document.getElementById('roundTrip').checked = false;
        });
    }

    function deleteEntry(id) {
        if(confirm("למחוק את המשמרת?")) database.ref('shifts/' + id).remove();
    }

    database.ref('shifts').on('value', (s) => {
        const data = s.val();
        const body = document.getElementById('tableBody');
        const footer = document.getElementById('tableFooter');
        body.innerHTML = '';
        let tKm = 0, tFuel = 0, tStraw = 0, tNet = 0;

        if (data) {
            Object.values(data).sort((a,b)=>b.timestamp-a.timestamp).forEach(x => {
                const s = x.strawberries || 0;
                tKm += x.km; tFuel += x.fuel; tStraw += s; tNet += x.net;
                body.innerHTML += `
                    <tr>
                        <td>${x.date}</td>
                        <td class="route-cell" title="${x.route || '-'}">${x.route || '-'}</td>
                        <td>${x.km.toFixed(1)}</td>
                        <td>${x.fuel.toFixed(1)}</td>
                        <td style="color:red">₪${s.toFixed(2)}</td>
                        <td><b>₪${x.net.toFixed(1)}</b></td>
                        <td><button class="del-btn" onclick="deleteEntry('${x.timestamp}')">🗑️</button></td>
                    </tr>`;
            });
            footer.innerHTML = `
                <tr class="footer-row">
                    <td>סה"כ</td>
                    <td>-</td>
                    <td>${tKm.toFixed(1)}</td>
                    <td>₪${tFuel.toFixed(1)}</td>
                    <td style="color:red">₪${tStraw.toFixed(2)}</td>
                    <td style="color:green">₪${tNet.toFixed(1)}</td>
                    <td></td>
                </tr>`;
        }
    });
</script>
</body>
</html>
